<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
    <h2>Edit Expense</h2>

    <form method="POST">
        <input type="text" name="title" value="{{ expense.title }}" required><br><br>
        <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required><br><br>
        <input type="text" name="category" value="{{ expense.category }}" required><br><br>
        <input type="date" name="expense_date" value="{{ expense.expense_date }}" required><br><br>
        <button type="submit">Update Expense</button>
    </form>

    <br>
    <a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
